<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мої завдання</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .task-list { margin-top: 2rem; }
        .task-item { background: #eee; padding: 1rem; margin-bottom: 0.5rem; border-radius: 5px; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="welcome-msg">Вітаю!</h2>
        <button class="logout-btn" onclick="logout()">Вийти</button>
    </div>

    <div class="add-task">
        <input type="text" id="taskTitle" placeholder="Що потрібно зробити?">
        <button onclick="addTask()">Додати</button>
    </div>

    <div id="tasks" class="task-list"></div>

    <script>
        const API_URL = "https://prioritytasks.onrender.com";
        const userId = localStorage.getItem('userId');

        // Перевірка: якщо не залогінений — на вихід
        if (!userId) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('welcome-msg').innerText = `Вітаю, ${localStorage.getItem('username')}!`;
            loadTasks();
        }

        async function loadTasks() {
            const response = await fetch(`${API_URL}/api/tasks/${userId}`);
            const tasks = await response.json();
            const container = document.getElementById('tasks');
            container.innerHTML = '';

            tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = 'task-item';
                div.innerText = task.title;
                container.appendChild(div);
            });
        }

        async function addTask() {
            const title = document.getElementById('taskTitle').value;
            if (!title) return;

            const response = await fetch(`${API_URL}/api/tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: title,
                    user_id: userId,
                    urgency: 1, // Можна додати вибір з форми
                    importance: 1
                })
            });

            if (response.ok) {
                document.getElementById('taskTitle').value = '';
                loadTasks();
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
